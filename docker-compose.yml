services:
  api:
    build:
      context: ./backend/src/InstaClone.Api
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=InstaClone;User Id=sa;Password=YourStr0ng!Pass;TrustServerCertificate=True
      - Jwt__Key=super-secret-dev-key-that-is-at-least-32-chars!!
      - Jwt__Issuer=InstaClone
      - Jwt__Audience=InstaClone

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api

  db:
    image: mcr.microsoft.com/azure-sql-edge:latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStr0ng!Pass
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/net/tcp | grep ':0599 ' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  sqldata:
  uploads:
